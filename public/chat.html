<!DOCTYPE html>

<html>
<head>
<title>Dev Chat Room</title>

<style>
#chatbox {
    border: 1px solid black;
    width: 600px;
    height: 300px;
    overflow-y: auto;
    padding: 5px;
}
</style>

</head>

<body>

<a href="/Index.html">Leave Chat</a>

<h1>Developer Chatroom</h1>

<div id="welcome"></div>
<div id="chatbox"></div>

<br>

<input type="text" id="message" size="50">
<button onclick="sendMessage()">Send</button>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgz9anw4MhSyRKNymLOMkQgsvy5-C0c1Q",
  authDomain: "devchat-66db4.firebaseapp.com",
  databaseURL: "https://devchat-66db4-default-rtdb.firebaseio.com",
  projectId: "devchat-66db4",
  storageBucket: "devchat-66db4.firebasestorage.app",
  messagingSenderId: "671934347659",
  appId: "1:671934347659:web:ef82690568f5217ce5d78e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const pingSound = new Audio("https://raw.githubusercontent.com/ayytrix/papaootae/refs/heads/main/public/ping.mp3");
pingSound.volume = 0.5;

let username = localStorage.getItem("username") || "Guest";

document.getElementById("welcome").innerHTML =
    "Logged in as: <b>" + username + "</b>";

function sendMessage() {
    let msg = document.getElementById("message").value.trim();
    if (!msg) return;

    db.ref("messages").push({
        user: username,
        text: msg,
        time: Date.now()
    });

    document.getElementById("message").value = "";
}

db.ref("messages").on("child_added", (snapshot) => {
    const data = snapshot.val();

    document.getElementById("chatbox").innerHTML +=
        "<p>" + data.user + ": " + data.text + "</p>";

    pingSound.play().catch(() => {});
});
</script>

</body>
</html>
